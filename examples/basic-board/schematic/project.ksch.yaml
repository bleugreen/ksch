ksch: 1
project:
  name: basic-board
  title: Basic Board
libraries:
  symbols:
    project:
      Starter: lib/Starter.kicad_sym
symbols:
  J1:
    lib: Starter:Conn4
    value: USB_IN
    connects:
      VBUS: VBUS
      GND: GND
      D+: nc
      D-: nc
  U1:
    lib: Starter:LDO_3Pin
    value: 3V3_REG
    connects:
      VIN: VBUS
      VOUT: +3V3
      GND: GND
  C1:
    lib: Starter:C
    value: 10uF
    connects:
      '1': VBUS
      '2': GND
  C2:
    lib: Starter:C
    value: 100nF
    connects:
      '1': +3V3
      '2': GND
