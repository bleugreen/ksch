repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy src tests
        language: system
        types_or: [python, pyi]
        pass_filenames: false

      - id: fast-tests
        name: fast pytest
        entry: uv run pytest -q tests/test_package.py tests/test_cli.py tests/test_compile_cli.py tests/test_init_cli.py
        language: system
        pass_filenames: false
